<div class="flex flex-col h-screen">

  <!-- Header -->
  <div class="w-screen h-20 flex items-center justify-center border-y rounded-2xl border-gray-600">
    <div class="p-2 font-medium">
      {{ title }}
    </div>
  </div>

  <!-- Center -->
  <div class="flex-1 flex items-center justify-center">

    <div class="border border-gray-600 rounded-2xl
                w-3/4 md:w-1/2 lg:w-1/2
                p-6">

      <h1 class="text-center font-semibold text-lg mb-6">
        Register Form
      </h1>

      <form class="flex flex-col gap-5" (ngSubmit)="register()">

        <!-- Username -->
        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium">Username</label>
          <input
            type="text"
            name="username"
            [(ngModel)]="name"
            placeholder="Enter username"
            class="border border-gray-300 rounded px-3 py-2 w-full"
          />
        </div>

        <!-- Gmail -->
        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium">Gmail</label>
          <input
            type="email"
            name="gmail"
            [(ngModel)]="gmail"
            placeholder="Example123@gmail.com"
            class="border border-gray-300 rounded px-3 py-2 w-full"
          />
        </div>

        <!-- Password -->
        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium">Password</label>
          <input
            type="password"
            name="password"
            [(ngModel)]="password"
            placeholder="Enter password"
            class="border border-gray-300 rounded px-3 py-2 w-full"
          />
        </div>

        <!-- Confirm Password -->
        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium">Confirm Password</label>
          <input
            type="password"
            name="confirmPassword"
            [(ngModel)]="confirmPassword"
            placeholder="Re-enter password"
            class="border border-gray-300 rounded px-3 py-2 w-full"
          />
        </div>

        <!-- Signup Button -->
        <button
          type="submit"
          class="border border-gray-600 rounded py-2 mt-2 hover:bg-gray-800 transition"
        >
          Signup
        </button>

        <!-- Footer -->
        <div class="flex justify-center text-xs gap-2 mt-2">
          <p>Already have an account?</p>
          <button
            type="button"
            class="text-blue-600 hover:underline"
            routerLink="/login"
          >
            Login
          </button>
        </div>

      </form>

    </div>
  </div>

</div>
